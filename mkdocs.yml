site_name: Keyboard Compendium
site_url: https://compendium.modedesigns.com/
site_description: "A reference for keeping Mode keyboards on the desk: parts, cross-compatibility, availability, and design files for every board Mode has made."
copyright: Copyright &copy; 2026 Mode Designs LLC. Openly licensed; "Mode" and product names are trademarks of Mode Designs LLC.
repo_url: https://github.com/Mode-Designs/keyboard-compendium
edit_uri: edit/main/docs/
theme:
  name: material
  custom_dir: overrides
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - content.action.edit
  palette:
    # Defaults to the visitor's system preference; the header toggle switches
    # and persists the choice. Light = custom "mode" scheme; dark = "slate"
    # (Material's dark base) re-skinned to a green ground in extra.css.
    - media: "(prefers-color-scheme: light)"
      scheme: mode
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: theme/logo.svg
  favicon: theme/favicon.png
  # Fonts are self-hosted via stylesheets/extra.css; Material's font setting
  # only loads from Google Fonts.
  font: false
plugins:
  - search
extra_css:
  - stylesheets/extra.css
extra:
  homepage: https://modedesigns.com
  generator: false
markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - material.extensions.preview:
      configurations:
        - targets:
            include:
              - parts/**
# Part pages are intentionally not in the nav; they are reached from each
# keyboard's Components table.
not_in_nav: |
  parts/*.md
nav:
  - Start Here: index.md
  - PCBs & Firmware: pcbs.md
  - Keyboards:
    - 2026 Encore:
      - keyboards/encore-2026/index.md
      - Components: keyboards/encore-2026/components.md
